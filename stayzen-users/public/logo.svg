<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fd1c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#68d391;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Roof -->
  <path d="M250 100 L70 200 H120 L250 125 L380 200 H430 L250 100 Z" fill="url(#grad)" stroke="url(#grad)" stroke-width="2"/>
  <rect x="330" y="130" width="25" height="40" fill="url(#grad)" />

  <!-- S -->
  <text x="250" y="420" font-family="Verdana, Arial, sans-serif" font-weight="bold" font-size="300" text-anchor="middle" fill="#1e3a8a">S</text>

  <!-- Lock Overlay -->
  <g transform="translate(280, 310)">
     <rect x="5" y="30" width="50" height="40" rx="6" fill="url(#grad)" />
     <path d="M15 30 V15 A15 15 0 0 1 45 15 V30" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
     <circle cx="30" cy="48" r="5" fill="white" />
     <rect x="27" y="48" width="6" height="10" fill="white" />
  </g>
</svg>
